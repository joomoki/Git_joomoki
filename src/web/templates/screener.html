<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 스크리너 - 주모키</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .form-input {
            @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm;
        }

        .form-label {
            @apply block text-sm font-medium text-gray-700 mb-1;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen pb-10">

    <!-- Header -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <a href="/"
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-pink-600">Joomoki</a>
                <a href="/market" class="text-gray-700 font-medium hover:text-purple-600 hidden md:block">시장현황</a>
                <a href="/screener" class="text-purple-600 font-bold hidden md:block">스크리너</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 mt-8 flex flex-col md:flex-row gap-6">

        <!-- Filters Sidebar -->
        <div class="w-full md:w-64 bg-white p-5 rounded-xl shadow h-fit">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z"
                        clip-rule="evenodd" />
                </svg>
                검색 필터
            </h2>

            <div class="space-y-4">
                <!-- Trend -->
                <div>
                    <label class="form-label">AI 예측 추세</label>
                    <select id="trend" class="form-input">
                        <option value="ALL">전체</option>
                        <option value="UP">상승 예측 (UP)</option>
                        <option value="DOWN">하락 예측 (DOWN)</option>
                    </select>
                </div>

                <!-- PER -->
                <div>
                    <label class="form-label">PER (주가수익비율)</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="min_per" placeholder="최소" class="form-input">
                        <span class="text-gray-400">~</span>
                        <input type="number" id="max_per" placeholder="최대" class="form-input">
                    </div>
                </div>

                <!-- PBR -->
                <div>
                    <label class="form-label">PBR (주가순자산비율)</label>
                    <div class="flex gap-2 items-center">
                        <input type="number" id="min_pbr" placeholder="최소" class="form-input" step="0.1">
                        <span class="text-gray-400">~</span>
                        <input type="number" id="max_pbr" placeholder="최대" class="form-input" step="0.1">
                    </div>
                </div>

                <!-- Market Cap -->
                <div>
                    <label class="form-label">최소 시가총액 (억원)</label>
                    <input type="number" id="min_market_cap" placeholder="예: 1000" class="form-input">
                </div>

                <button onclick="searchStocks()"
                    class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 transition mt-2">
                    검색하기
                </button>
            </div>
        </div>

        <!-- Results -->
        <div class="flex-1">
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">검색 결과 <span id="count"
                            class="text-purple-600 text-sm ml-2"></span></h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="resultTable">
                        <thead class="bg-gray-50 text-gray-500 text-sm uppercase">
                            <tr>
                                <th class="px-6 py-3">종목명</th>
                                <th class="px-6 py-3">현재가</th>
                                <th class="px-6 py-3">등락률</th>
                                <th class="px-6 py-3">PER</th>
                                <th class="px-6 py-3">PBR</th>
                                <th class="px-6 py-3">시가총액</th>
                                <th class="px-6 py-3">포착 신호</th>
                                <th class="px-6 py-3 text-right">상세</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            <!-- JS로 데이터 로로드 -->
                            <tr>
                                <td colspan="8" class="px-6 py-8 text-center text-gray-500">
                                    좌측 필터를 설정하고 검색 버튼을 눌러주세요.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function searchStocks() {
            const tbody = document.querySelector("#resultTable tbody");
            tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">검색 중...</td></tr>';

            const data = {
                trend: document.getElementById('trend').value,
                min_per: document.getElementById('min_per').value,
                max_per: document.getElementById('max_per').value,
                min_pbr: document.getElementById('min_pbr').value,
                max_pbr: document.getElementById('max_pbr').value,
                min_market_cap: document.getElementById('min_market_cap').value,
            };

            try {
                const res = await fetch('/api/screener', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const stocks = await res.json();
                document.getElementById('count').innerText = `(${stocks.length}건)`;

                tbody.innerHTML = '';

                if (stocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">조건에 맞는 종목이 없습니다.</td></tr>';
                    return;
                }

                stocks.forEach(stock => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition";

                    const price = stock.close ? stock.close.toLocaleString() : '-';
                    const per = stock.per ? stock.per : '-';
                    const pbr = stock.pbr ? stock.pbr : '-';
                    const mcap = stock.market_cap ? Math.floor(stock.market_cap / 100000000).toLocaleString() + '억' : '-';

                    let trendBadge = '';
                    if (stock.prediction === 'UP') trendBadge = '<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs font-bold ml-2">UP</span>';
                    if (stock.prediction === 'DOWN') trendBadge = '<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold ml-2">DOWN</span>';

                    // Parse signals
                    let signalsHtml = '';
                    if (stock.signals && stock.signals.length > 0) {
                        try {
                            // If signals is string, parse it. If object, use it.
                            const signals = typeof stock.signals === 'string' ? JSON.parse(stock.signals) : stock.signals;
                            signals.forEach(s => {
                                let colorClass = 'bg-gray-100 text-gray-700';
                                if (s.type === 'POSITIVE' || s.type === 'OPPORTUNITY') colorClass = 'bg-red-50 text-red-600 border border-red-100';
                                if (s.type === 'NEGATIVE' || s.type === 'WARNING') colorClass = 'bg-blue-50 text-blue-600 border border-blue-100';
                                signalsHtml += `<span class="inline-block px-2 py-1 rounded text-xs mr-1 mb-1 ${colorClass}">${s.msg.split('!')[0]}</span>`;
                            });
                        } catch (e) {
                            console.error("Signal parse error", e);
                        }
                    } else {
                        signalsHtml = '<span class="text-gray-300 text-xs">-</span>';
                    }

                    tr.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="font-bold text-gray-900">${stock.name}${trendBadge}</div>
                            <div class="text-xs text-gray-400 font-mono">${stock.code} | ${stock.market}</div>
                        </td>
                        <td class="px-6 py-4 font-mono font-medium">${price}원</td>
                        <td class="px-6 py-4 text-gray-500">-</td>
                        <td class="px-6 py-4">${per}</td>
                        <td class="px-6 py-4">${pbr}</td>
                        <td class="px-6 py-4">${mcap}</td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap max-w-xs">
                                ${signalsHtml}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="/stock/${stock.code}" class="text-purple-600 hover:text-purple-800 font-bold text-xs">분석보기 &rarr;</a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-red-500">오류가 발생했습니다.</td></tr>';
            }
        }

        // 초기 로드 시 전체 검색
        window.addEventListener('DOMContentLoaded', searchStocks);
    </script>
</body>

</html>
